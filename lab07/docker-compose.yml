# docker-compose.yml — Reminder Engine stack (production-ready)
#
# Usage:
#   docker compose up -d
#   docker compose ps          # check health status
#   docker compose logs -f app
#
# Secrets (POSTGRES_PASSWORD, etc.) must come from an .env file or your
# secrets manager — never commit real credentials. See .env.example.

# Use Compose spec (no top-level "version:" key needed on modern Docker).

services:
  # ─────────────────────────────────────────────────────────────────────────
  # Python application: runs the reminder engine.
  # Builds from the local Dockerfile (multi-stage, non-root recommended).
  # ─────────────────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: reminder-engine:latest
    # restart on failure so transient crashes self-heal, but stop trying
    # after the daemon decides the container is unrecoverable.
    restart: unless-stopped
    # Wait for Postgres to be HEALTHY (not just started) before booting.
    depends_on:
      db:
        condition: service_healthy
    environment:
      # DB connection — assembled from discrete vars for clarity.
      # The host MUST be the service name "db" (resolved on the bridge network).
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      DATABASE_NAME: ${POSTGRES_DB:-reminders}
      DATABASE_USER: ${POSTGRES_USER:-reminder_user}
      # Password is injected from the environment / secrets store, not hardcoded.
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      # Full SQLAlchemy/psycopg-style URL for apps that prefer a single string.
      DATABASE_URL: postgresql://${POSTGRES_USER:-reminder_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:-reminders}
      APP_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PYTHONUNBUFFERED: "1"
    # Persist application-generated evidence/output between restarts.
    volumes:
      - app_data:/app/data
    networks:
      - backend
    # Liveness probe: the app must expose a lightweight health check.
    # Adjust the command to match your app (HTTP endpoint or CLI self-check).
    healthcheck:
      test: ["CMD", "python", "-c", "import socket,os,sys; s=socket.create_connection((os.environ['DATABASE_HOST'], int(os.environ['DATABASE_PORT'])), 5); s.close()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    # Cap resources so a runaway process can't starve the host.
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    # Drop the ability to gain new privileges; harden the runtime.
    security_opt:
      - no-new-privileges:true

  # ─────────────────────────────────────────────────────────────────────────
  # PostgreSQL database: stores approvals, reminder attempts, scheduler runs.
  # ─────────────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      # These three are read by the official postgres image on first init.
      POSTGRES_DB: ${POSTGRES_DB:-reminders}
      POSTGRES_USER: ${POSTGRES_USER:-reminder_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      # Initialize the data dir in a subfolder so the named volume stays clean.
      PGDATA: /var/lib/postgresql/data/pgdata
    # Named volume keeps data across container recreation; optional init SQL.
    volumes:
      - db_data:/var/lib/postgresql/data
      # - ./initdb:/docker-entrypoint-initdb.d:ro   # uncomment to seed schema
    networks:
      - backend
    # Do NOT publish 5432 to the host in production unless you need external
    # access; keeping it internal limits the attack surface.
    # ports:
    #   - "127.0.0.1:5432:5432"   # bind to localhost only if you must expose it
    # Health probe: pg_isready confirms the server accepts connections.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reminder_user} -d ${POSTGRES_DB:-reminders}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    security_opt:
      - no-new-privileges:true

# ─────────────────────────────────────────────────────────────────────────────
# Named volumes: managed by Docker, survive `docker compose down` (without -v).
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  db_data:
    driver: local
  app_data:
    driver: local

# ─────────────────────────────────────────────────────────────────────────────
# Custom bridge network: isolates these services and enables DNS-based
# service discovery (the app reaches Postgres at hostname "db").
# ─────────────────────────────────────────────────────────────────────────────
networks:
  backend:
    driver: bridge
